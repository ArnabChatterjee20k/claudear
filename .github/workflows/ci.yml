name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      FASTEMBED_CACHE_DIR: /home/runner/.cache/fastembed
      HF_HOME: /home/runner/.cache/fastembed
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      FASTEMBED_CACHE_DIR: /home/runner/.cache/fastembed
      HF_HOME: /home/runner/.cache/fastembed
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache fastembed model
        uses: actions/cache@v5
        with:
          path: ${{ env.FASTEMBED_CACHE_DIR }}
          key: fastembed-nomic-embed-text-v1.5
          enableCrossOsArchive: true

      - name: Warmup embedding model
        run: |
          python3 -m pip install -q huggingface-hub
          python3 -c "
          from huggingface_hub import snapshot_download
          snapshot_download(
              'nomic-ai/nomic-embed-text-v1.5',
              allow_patterns=['onnx/model.onnx', 'tokenizer.json', 'config.json', 'special_tokens_map.json'],
              cache_dir='${FASTEMBED_CACHE_DIR}',
          )
          "

      - name: Run tests
        run: cargo tarpaulin --out Xml --all-features

      - name: Upload coverage to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            artifact: claudear-macos
            binary_path: target/release/claudear
          - name: Windows
            os: windows-latest
            artifact: claudear-windows
            binary_path: target/release/claudear.exe
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary_path }}

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Configure git
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache fastembed model
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}\.cache\fastembed
          key: fastembed-nomic-v15-windows

      - name: Compile tests
        run: cargo test --all-features --no-run

      - name: Warmup embedding model
        timeout-minutes: 5
        run: cargo test --all-features -- feedback::embeddings::tests::test_warmup_downloads_model --exact --nocapture
        env:
          FASTEMBED_CACHE_DIR: ${{ runner.temp }}\.cache\fastembed
          HF_HOME: ${{ runner.temp }}\.cache\fastembed

      - name: Run tests
        timeout-minutes: 10
        run: cargo test --all-features
        env:
          FASTEMBED_CACHE_DIR: ${{ runner.temp }}\.cache\fastembed
          HF_HOME: ${{ runner.temp }}\.cache\fastembed

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test
