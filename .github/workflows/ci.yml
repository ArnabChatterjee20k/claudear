name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
  FASTEMBED_CACHE_DIR: /home/runner/.cache/fastembed
  HF_HOME: /home/runner/.cache/fastembed

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache fastembed model
        uses: actions/cache@v5
        with:
          path: ${{ env.FASTEMBED_CACHE_DIR }}
          key: fastembed-nomic-embed-text-v1.5
          enableCrossOsArchive: true

      - name: Warmup embedding model
        run: |
          REPO="nomic-ai/nomic-embed-text-v1.5"
          MODEL_DIR="${FASTEMBED_CACHE_DIR}/models--nomic-ai--nomic-embed-text-v1.5"
          COMMIT=$(curl -sf "https://huggingface.co/api/models/${REPO}" | grep -o '"sha":"[^"]*"' | head -1 | cut -d'"' -f4)
          mkdir -p "${MODEL_DIR}/refs" "${MODEL_DIR}/blobs" "${MODEL_DIR}/snapshots/${COMMIT}/onnx"
          printf '%s' "${COMMIT}" > "${MODEL_DIR}/refs/main"
          for file in tokenizer.json config.json special_tokens_map.json onnx/model.onnx; do
            ETAG=$(curl -sI "https://huggingface.co/${REPO}/resolve/main/${file}" | sed -n 's/.*X-Linked-ETag: "\([^"]*\)".*/\1/p')
            curl -sfL "https://huggingface.co/${REPO}/resolve/main/${file}" -o "${MODEL_DIR}/blobs/${ETAG}"
            DEPTH=$(echo "${file}" | tr -cd '/' | wc -c | tr -d ' ')
            [ "${DEPTH}" -eq 0 ] && REL="../../" || REL="../../../"
            ln -sf "${REL}blobs/${ETAG}" "${MODEL_DIR}/snapshots/${COMMIT}/${file}"
          done

      - name: Run tests
        run: cargo tarpaulin --out Xml --all-features

      - name: Upload coverage to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: claudear-macos
          path: target/release/claudear

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test
