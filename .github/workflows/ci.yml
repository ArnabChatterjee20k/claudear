name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
  FASTEMBED_CACHE_DIR: /home/runner/.cache/fastembed
  HF_HOME: /home/runner/.cache/fastembed

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.crate }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - claudear-core
          - claudear-config
          - claudear-storage
          - claudear-analysis
          - claudear-engine
          - claudear-integrations
          - claudear
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-tarpaulin
        run: cargo binstall --no-confirm cargo-tarpaulin

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache fastembed model
        if: matrix.crate == 'claudear-analysis' || matrix.crate == 'claudear'
        id: fastembed-cache
        uses: actions/cache@v5
        with:
          path: ${{ env.FASTEMBED_CACHE_DIR }}
          key: fastembed-nomic-embed-text-v1.5
          enableCrossOsArchive: true

      - name: Download embedding model
        if: (matrix.crate == 'claudear-analysis' || matrix.crate == 'claudear') && steps.fastembed-cache.outputs.cache-hit != 'true'
        run: |
          python3 -m pip install -q huggingface-hub
          python3 -c "
          from huggingface_hub import snapshot_download
          snapshot_download(
              'nomic-ai/nomic-embed-text-v1.5',
              allow_patterns=['onnx/model.onnx', 'tokenizer.json', 'config.json', 'special_tokens_map.json'],
              cache_dir='${FASTEMBED_CACHE_DIR}',
          )
          "

      - name: Run tests
        run: cargo tarpaulin -p ${{ matrix.crate }} --all-features --out Xml

      - name: Upload coverage to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
          flags: ${{ matrix.crate }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: claudear-macos
          path: target/release/claudear

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test
