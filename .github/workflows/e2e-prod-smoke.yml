name: Production E2E Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * *"

env:
  CARGO_TERM_COLOR: always

jobs:
  prod-e2e:
    name: Real Prod Flow
    if: ${{ vars.CLAUDEAR_PROD_E2E_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ensure required tools are available
        run: |
          sudo apt-get update
          sudo apt-get install -y jq sqlite3

      - name: Install Claude CLI (if missing)
        run: |
          if command -v claude >/dev/null 2>&1; then
            claude --version
          else
            npm install -g @anthropic-ai/claude-code
            claude --version
          fi

      - name: Validate required secrets
        env:
          CLAUDEAR_E2E_LINEAR_API_KEY: ${{ secrets.CLAUDEAR_E2E_LINEAR_API_KEY }}
          CLAUDEAR_E2E_LINEAR_TEAM_ID: ${{ secrets.CLAUDEAR_E2E_LINEAR_TEAM_ID }}
          CLAUDEAR_E2E_GITHUB_REPO: ${{ secrets.CLAUDEAR_E2E_GITHUB_REPO }}
          CLAUDEAR_E2E_GITHUB_TOKEN: ${{ secrets.CLAUDEAR_E2E_GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          missing=()
          for key in \
            CLAUDEAR_E2E_LINEAR_API_KEY \
            CLAUDEAR_E2E_LINEAR_TEAM_ID \
            CLAUDEAR_E2E_GITHUB_REPO \
            CLAUDEAR_E2E_GITHUB_TOKEN
          do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

          if [ -z "${ANTHROPIC_API_KEY:-}" ] && [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            auth_status="$(claude auth status 2>/dev/null || true)"
            logged_in="$(echo "${auth_status}" | jq -r '.loggedIn // false' 2>/dev/null || echo false)"
            if [ "${logged_in}" != "true" ]; then
              echo "::error::No Claude auth detected. Set ANTHROPIC_API_KEY / CLAUDE_CODE_OAUTH_TOKEN, or pre-login the runner with 'claude auth login'."
              exit 1
            fi
          fi

      - name: Build release binary
        run: cargo build --release

      - name: Run production smoke test
        env:
          CLAUDEAR_E2E_LINEAR_API_KEY: ${{ secrets.CLAUDEAR_E2E_LINEAR_API_KEY }}
          CLAUDEAR_E2E_LINEAR_TEAM_ID: ${{ secrets.CLAUDEAR_E2E_LINEAR_TEAM_ID }}
          CLAUDEAR_E2E_GITHUB_REPO: ${{ secrets.CLAUDEAR_E2E_GITHUB_REPO }}
          CLAUDEAR_E2E_GITHUB_TOKEN: ${{ secrets.CLAUDEAR_E2E_GITHUB_TOKEN }}
          CLAUDEAR_E2E_DISCORD_BOT_TOKEN: ${{ secrets.CLAUDEAR_E2E_DISCORD_BOT_TOKEN }}
          CLAUDEAR_E2E_DISCORD_CHANNEL_ID: ${{ vars.CLAUDEAR_E2E_DISCORD_CHANNEL_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CLAUDEAR_E2E_CLOSE_PR: "true"
          CLAUDEAR_E2E_DELETE_BRANCH: "false"
        run: ./scripts/prod-e2e-smoke.sh
