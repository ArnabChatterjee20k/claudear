# Development overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: cargo watch -x "run -- dashboard"
    volumes:
      - .:/app
      - cargo_cache:/usr/local/cargo/registry
      - target_cache:/app/target
    environment:
      RUST_LOG: debug
      RUST_BACKTRACE: 1

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.dev
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:3100

volumes:
  cargo_cache:
  target_cache:
