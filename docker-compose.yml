services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
        # Dashboard Sentry config (baked into static JS assets at build time)
        SENTRY_DSN: ${SENTRY_DSN_DASHBOARD:-}
        SENTRY_RELEASE: ${SENTRY_RELEASE:-}
        SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
    container_name: claudear-app
    restart: unless-stopped
    environment:
      # Data directory (SQLite database stored here)
      DATA_DIR: /app/data

      # Workspace directory (mounted)
      WORKSPACE: /app/workspace

      # Webhook port
      WEBHOOK_PORT: 3100

      # Embedding model (default: nomic, options: nomic, minilm, bge)
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic}

      # Source configurations (from .env)
      LINEAR_API_KEY: ${LINEAR_API_KEY:-}
      LINEAR_ENABLED: ${LINEAR_ENABLED:-true}
      LINEAR_TRIGGER_LABELS: ${LINEAR_TRIGGER_LABELS:-auto-implement,claude}
      LINEAR_TRIGGER_STATES: ${LINEAR_TRIGGER_STATES:-backlog,todo}
      LINEAR_WEBHOOK_SECRET: ${LINEAR_WEBHOOK_SECRET:-}

      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
      SENTRY_ORG_SLUG: ${SENTRY_ORG_SLUG:-}
      SENTRY_ENABLED: ${SENTRY_ENABLED:-true}
      SENTRY_CLIENT_SECRET: ${SENTRY_CLIENT_SECRET:-}

      # Backend Sentry error monitoring (read at runtime by the Rust process)
      SENTRY_DSN: ${SENTRY_DSN_BACKEND:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}

      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_AUTO_RESOLVE_ON_MERGE: ${GITHUB_AUTO_RESOLVE_ON_MERGE:-true}

      # Claude Code authentication (if unset, container will prompt OAuth login on first start)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # Notifications
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      DISCORD_USER_ID: ${DISCORD_USER_ID:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_CHANNEL_ID: ${DISCORD_CHANNEL_ID:-}

      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_TO: ${EMAIL_TO:-}
    volumes:
      - ./data:/app/data
      - ${WORKSPACE:-.}:/app/workspace:ro
      - ./claudear.toml:/app/claudear.toml:ro
      # Cache embedding models between container restarts
      - embedding_cache:/home/appuser/.cache/fastembed
      # Persist Claude Code auth across container restarts
      - claude_config:/home/appuser/.claude
    ports:
      - "${APP_PORT:-3100}:3100"
    networks:
      - edge

networks:
  edge:
    driver: bridge

volumes:
  embedding_cache:
  claude_config:
