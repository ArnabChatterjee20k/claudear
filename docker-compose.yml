services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
        # Dashboard Sentry config (baked into static JS assets at build time)
        CLAUDEAR_SENTRY_DSN: ${CLAUDEAR_SENTRY_DSN_DASHBOARD:-}
        CLAUDEAR_SENTRY_RELEASE: ${CLAUDEAR_SENTRY_RELEASE:-}
        CLAUDEAR_SENTRY_ENVIRONMENT: ${CLAUDEAR_SENTRY_ENVIRONMENT:-production}
    container_name: claudear-app
    restart: unless-stopped
    environment:
      # Data directory (SQLite database stored here)
      CLAUDEAR_DB_PATH: /app/data/claudear.db

      # Workspace directory (mounted)
      CLAUDEAR_WORKSPACE: /app/workspace

      # Webhook port
      CLAUDEAR_WEBHOOK_PORT: 3100

      # Embedding model (default: nomic, options: nomic, minilm, bge)
      CLAUDEAR_EMBEDDING_MODEL: ${CLAUDEAR_EMBEDDING_MODEL:-nomic}

      # Source configurations (from .env)
      CLAUDEAR_LINEAR_API_KEY: ${CLAUDEAR_LINEAR_API_KEY:-}
      CLAUDEAR_LINEAR_ENABLED: ${CLAUDEAR_LINEAR_ENABLED:-true}
      CLAUDEAR_LINEAR_TRIGGER_LABELS: ${CLAUDEAR_LINEAR_TRIGGER_LABELS:-auto-implement,claude}
      CLAUDEAR_LINEAR_TRIGGER_STATES: ${CLAUDEAR_LINEAR_TRIGGER_STATES:-backlog,todo}
      CLAUDEAR_LINEAR_WEBHOOK_SECRET: ${CLAUDEAR_LINEAR_WEBHOOK_SECRET:-}

      CLAUDEAR_SENTRY_AUTH_TOKEN: ${CLAUDEAR_SENTRY_AUTH_TOKEN:-}
      CLAUDEAR_SENTRY_ORG_SLUG: ${CLAUDEAR_SENTRY_ORG_SLUG:-}
      CLAUDEAR_SENTRY_ENABLED: ${CLAUDEAR_SENTRY_ENABLED:-true}
      CLAUDEAR_SENTRY_CLIENT_SECRET: ${CLAUDEAR_SENTRY_CLIENT_SECRET:-}

      # Backend Sentry error monitoring (read at runtime by the Rust process)
      CLAUDEAR_SENTRY_DSN: ${CLAUDEAR_SENTRY_DSN:-}
      CLAUDEAR_SENTRY_ENVIRONMENT: ${CLAUDEAR_SENTRY_ENVIRONMENT:-production}
      CLAUDEAR_SENTRY_RELEASE: ${CLAUDEAR_SENTRY_RELEASE:-}

      CLAUDEAR_GITHUB_TOKEN: ${CLAUDEAR_GITHUB_TOKEN:-}
      CLAUDEAR_GITHUB_AUTO_RESOLVE_ON_MERGE: ${CLAUDEAR_GITHUB_AUTO_RESOLVE_ON_MERGE:-true}

      # Claude Code authentication (if unset, container will prompt OAuth login on first start)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # Notifications
      CLAUDEAR_DISCORD_WEBHOOK_URL: ${CLAUDEAR_DISCORD_WEBHOOK_URL:-}
      CLAUDEAR_DISCORD_USER_ID: ${CLAUDEAR_DISCORD_USER_ID:-}
      CLAUDEAR_DISCORD_BOT_TOKEN: ${CLAUDEAR_DISCORD_BOT_TOKEN:-}
      CLAUDEAR_DISCORD_CHANNEL_ID: ${CLAUDEAR_DISCORD_CHANNEL_ID:-}

      CLAUDEAR_SMTP_HOST: ${CLAUDEAR_SMTP_HOST:-}
      CLAUDEAR_SMTP_PORT: ${CLAUDEAR_SMTP_PORT:-587}
      CLAUDEAR_SMTP_USERNAME: ${CLAUDEAR_SMTP_USERNAME:-}
      CLAUDEAR_SMTP_PASSWORD: ${CLAUDEAR_SMTP_PASSWORD:-}
      CLAUDEAR_EMAIL_FROM: ${CLAUDEAR_EMAIL_FROM:-}
      CLAUDEAR_EMAIL_TO: ${CLAUDEAR_EMAIL_TO:-}

      # TLS auto-provisioning (Let's Encrypt)
      CLAUDEAR_TLS_ENABLED: ${CLAUDEAR_TLS_ENABLED:-false}
      CLAUDEAR_TLS_DOMAINS: ${CLAUDEAR_TLS_DOMAINS:-}
      CLAUDEAR_TLS_EMAIL: ${CLAUDEAR_TLS_EMAIL:-}
      CLAUDEAR_TLS_PRODUCTION: ${CLAUDEAR_TLS_PRODUCTION:-false}
      CLAUDEAR_TLS_CACHE_DIR: /app/data/acme_cache
    volumes:
      - ./data:/app/data
      - ${WORKSPACE:-.}:/app/workspace:ro
      - ./claudear.toml:/app/claudear.toml:ro
      # Cache embedding models between container restarts
      - embedding_cache:/home/appuser/.cache/fastembed
      # Persist Claude Code auth across container restarts
      - claude_config:/home/appuser/.claude
    ports:
      - "${APP_PORT:-3100}:3100"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTP_REDIRECT_PORT:-80}:80"
    networks:
      - edge

networks:
  edge:
    driver: bridge

volumes:
  embedding_cache:
  claude_config:
