<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E6CB6"/>
      <stop offset="100%" stop-color="#0E4D7A"/>
    </linearGradient>
  </defs>
  <!-- Outer arc (helix) — r=46, center (77,64), opening ±63° -->
  <path d="M 98 23 A 46 46 0 1 0 98 105"
        fill="none" stroke="url(#g3)" stroke-width="8" stroke-linecap="round"/>
  <!-- Inner arc (antihelix) — r=34, same center, same angle -->
  <path d="M 93 34 A 34 34 0 1 0 93 94"
        fill="none" stroke="url(#g3)" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Ear canal dot -->
  <circle cx="77" cy="64" r="8" fill="url(#g3)"/>
</svg>
